<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Game Station{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Kanit:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', 'Kanit', sans-serif;
            background-color: #0A0A0A; /* สีดำลึกแบบเกมมิ่ง */
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Style */
        .navbar {
            background-color: #121212 !important; /* ดำเทา */
            border-bottom: 2px solid #D20000; /* เส้นใต้สีแดงเอกลักษณ์ */
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 1.5px;
            color: #D20000 !important; /* ชื่อแบรนด์สีแดง */
            text-transform: uppercase;
        }

        .navbar a.nav-link {
            color: #ffffff !important;
            font-weight: 500;
            margin-left: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 14px;
        }

        .navbar a.nav-link:hover {
            color: #FF0000 !important;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7); /* เอฟเฟกต์เรืองแสง */
            transform: translateY(-2px);
        }

        /* Container adjustment */
        .main-content {
            flex: 1;
        }

        /* Footer Style */
        footer {
            background-color: #121212;
            color: #888888;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #333333;
            margin-top: 50px;
            font-size: 14px;
        }

        footer span.name {
            color: #D20000;
            font-weight: 600;
        }

        /* Scrollbar คุมธีม */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0A0A;
        }
        ::-webkit-scrollbar-thumb {
            background: #D20000;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FF0000;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-lg">
    <div class="container">
        <a class="navbar-brand" href="/">
            <span style="color: #fff;">Game</span> Station
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="background-color: #D20000;">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <div class="navbar-nav">
                <a class="nav-link" href="/">หน้าแรก</a>
                <a class="nav-link" href="/form/">พรีออเดอร์</a>
                <a class="nav-link" href="/about/">เกี่ยวกับ</a>
            </div>
        </div>
    </div>
</nav>

<div class="main-content container mt-5">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 <span style="color: #fff;">Game Station</span> | Dev by <span class="name">Wannakon Maktim</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
